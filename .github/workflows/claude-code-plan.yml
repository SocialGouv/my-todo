name: Claude Code Plan

on:
  issues:
    types: [labeled]

concurrency:
  cancel-in-progress: false
  group: claude-plan-${{ github.event.issue.number }}

jobs:
  plan:
    if: github.event.label.name == 'claude-code-plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Read the issue #${{ github.event.issue.number }} carefully using `gh issue view ${{ github.event.issue.number }}`.

            Your goal is to produce a detailed micro implementation plan. Do NOT write any code or create a PR.

            1. Analyze the codebase thoroughly to understand the existing architecture
            2. Identify all files that will need to be created or modified
            3. Break down the implementation into clear, ordered steps
            4. For each step, specify the exact files and what changes are needed
            5. Determine if you have any questions or ambiguities that MUST be resolved before implementing

            Write the plan to /tmp/plan.md using this exact Markdown structure:

            ## Plan d'implémentation

            ### Étape 1 : [title]
            - **Fichiers** : `path/to/file.ts`, `path/to/other.ts`
            - **Détails** : what to do in each file

            ### Étape 2 : [title]
            ...

            ## Estimation
            - Complexité : faible/moyenne/élevée
            - Effort estimé : X heures/jours

            ## Questions
            - List any questions (or "Aucune question." if none)

            Then post it: `gh issue comment ${{ github.event.issue.number }} --body-file /tmp/plan.md`

            CRITICAL final step — decide the next action:
            - If you have questions that MUST be answered before implementing, write "HAS_QUESTIONS" to /tmp/plan-result.txt
            - If the plan is clear and ready to implement, write "READY" to /tmp/plan-result.txt
          claude_args: >-
            --max-turns 30
            --allowedTools "Bash(gh issue view *),Bash(gh issue comment *),Bash(cat *),Bash(echo *)"

      - name: Read plan result
        id: result
        if: success()
        run: |
          if [ -f /tmp/plan-result.txt ]; then
            echo "status=$(cat /tmp/plan-result.txt)" >> $GITHUB_OUTPUT
          else
            echo "status=HAS_QUESTIONS" >> $GITHUB_OUTPUT
          fi

      - name: Add next label
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.result.outputs.status }}'.trim();
            const label = status === 'READY' ? 'claude-code-action' : 'needs-clarification';
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [label]
            });

      - name: Remove trigger label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'claude-code-plan'
              });
            } catch (e) {
              // Label might already be removed
            }
