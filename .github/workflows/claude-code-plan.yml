name: Claude Code Plan

on:
  issues:
    types: [labeled]

concurrency:
  cancel-in-progress: false
  group: claude-plan-${{ github.event.issue.number }}

jobs:
  plan:
    if: github.event.label.name == 'claude-code-plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Read the issue #${{ github.event.issue.number }} carefully using `gh issue view ${{ github.event.issue.number }}`.

            Your goal is to produce a detailed micro implementation plan. Do NOT write any code or create a PR.

            1. Analyze the codebase thoroughly to understand the existing architecture
            2. Identify all files that will need to be created or modified
            3. Break down the implementation into clear, ordered steps
            4. For each step, specify the exact files and what changes are needed
            5. If anything is unclear or ambiguous, list your questions

            Post your plan as a well-formatted Markdown comment on the issue using:
            `gh issue comment ${{ github.event.issue.number }} --body "YOUR_MARKDOWN_HERE"`

            Use this exact Markdown structure:

            ## Plan d'implémentation

            ### Étape 1 : [title]
            - **Fichiers** : `path/to/file.ts`, `path/to/other.ts`
            - **Détails** : what to do in each file

            ### Étape 2 : [title]
            ...

            ## Questions
            - List any questions or ambiguities (or "Aucune" if none)

            ## Estimation
            - Complexity: low/medium/high
            - Estimated effort: X hours/days

            IMPORTANT: The comment MUST be well-formatted Markdown with headers, bullet points, and code blocks. Write the body to a temporary file and use `gh issue comment ${{ github.event.issue.number }} --body-file /tmp/plan.md` to avoid shell escaping issues.
          claude_args: >-
            --max-turns 30
            --allowedTools "Bash(gh issue view *),Bash(gh issue comment *),Bash(cat *),Bash(echo *)"

      - name: Remove trigger label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: 'claude-code-plan'
              });
            } catch (e) {
              // Label might already be removed
            }
